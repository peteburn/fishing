{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h2>Change Password</h2>
<div class="card mt-3 mb-3">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% load django_bootstrap5 %}
      {% bootstrap_form form %}
      <button class="btn btn-primary" type="submit">Change Password</button>
    </form>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<h2>Login</h2>
<form method="post">
    {% csrf_token %}
    {% load django_bootstrap5 %}
    {% bootstrap_form form %}
    <button class="btn btn-primary" type="submit">Login</button>
    <input type="hidden" name="next" value="{{ next }}">
</form>
{% endblock %}

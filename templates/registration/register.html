{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="welcome-box">
    <h2>Create an account</h2>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
</div>
{% endblock %}
